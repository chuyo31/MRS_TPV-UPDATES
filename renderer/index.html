<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRS_TPV</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <!-- Pantalla de Asistente de Configuración -->
  <div id="screen-asistente" class="screen hidden">
    <div class="asistente-container">
      <h1>Bienvenido a MRS_TPV</h1>
      <p class="subtitle">Configuración inicial del sistema</p>
      
      <form id="form-asistente">
        <div class="form-section">
          <h2>Datos de la Empresa</h2>
          <div class="form-group">
            <label>Nombre de la empresa *</label>
            <input type="text" id="nombreEmpresa" required>
          </div>
          <div class="form-group">
            <label>CIF/NIF</label>
            <input type="text" id="cif">
          </div>
          <div class="form-group">
            <label>Dirección</label>
            <input type="text" id="direccion">
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" id="telefono">
          </div>
          <div class="form-group">
            <label>WhatsApp</label>
            <input type="tel" id="whatsapp">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email">
          </div>
          <div class="form-group">
            <label>IBAN</label>
            <input type="text" id="numeroCuenta">
          </div>
          <div class="form-group">
            <label>IVA por defecto (%)</label>
            <input type="number" id="ivaDefecto" value="21" min="0" max="100">
          </div>
        </div>

        <div class="form-section">
          <h2>Usuario Administrador</h2>
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="adminNombre" required>
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="adminEmail" required>
          </div>
          <div class="form-group">
            <label>Contraseña *</label>
            <input type="password" id="adminPassword" required minlength="6">
          </div>
          <div class="form-group">
            <label>Confirmar contraseña *</label>
            <input type="password" id="adminPasswordConfirm" required minlength="6">
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="btn-continuar-asistente">Continuar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Pantalla de Login -->
  <div id="screen-login" class="screen hidden">
    <div class="login-container">
      <div class="login-box">
        <div class="login-brand">
          <img id="login-logo" class="brand-logo login-logo hidden" alt="Logo">
          <h1 id="login-brand-name">MRS_TPV</h1>
        </div>
        <p class="subtitle">Iniciar sesión</p>
        
        <div id="license-warning" class="license-warning hidden"></div>
        
        <form id="form-login">
          <div class="form-group">
            <label>Usuario o email</label>
            <input type="text" id="loginEmail" required autocomplete="username" placeholder="Ej: Carlos o carlos@correo.com">
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="loginPassword" required autocomplete="current-password">
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-block">Iniciar sesión</button>
          </div>
        </form>

        <div id="login-error" class="error-message hidden"></div>
      </div>
    </div>
  </div>

  <!-- Pantalla de Activación de Licencia -->
  <div id="screen-license" class="screen hidden">
    <div class="license-container">
      <div class="license-box">
        <h1>Licencia Requerida</h1>
        <p class="subtitle">El periodo de prueba ha finalizado</p>
        
        <div class="license-info">
          <p>ID del equipo: <code id="deviceIdDisplay"></code></p>
          <button class="btn btn-ghost" id="copyDeviceId">Copiar ID</button>
        </div>

        <form id="form-license">
          <div class="form-group">
            <label>Clave de licencia</label>
            <input type="text" id="licenseKey" placeholder="MRS-XXXX-XXXX-XXXX o MRS2.xxxxx.yyyyy" required>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Activar licencia</button>
            <button type="button" class="btn btn-ghost" id="btn-import-license-file">Importar archivo</button>
          </div>
        </form>

        <div id="license-error" class="error-message hidden"></div>
      </div>
    </div>
  </div>

  <!-- Pantalla de Dashboard -->
  <div id="screen-dashboard" class="screen hidden">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <img id="topbar-logo" class="brand-logo topbar-logo hidden" alt="Logo">
        <span id="topbar-nombre" class="topbar-nombre"></span>
      </div>
      <div class="topbar-right">
        <div class="user-info">
          <span id="user-nombre"></span>
          <span class="separator">|</span>
          <span id="user-role"></span>
        </div>
        <button id="btn-theme-toggle" class="btn btn-ghost" title="Cambiar tema">
          <span id="theme-icon">🌙</span>
        </button>
        <button id="btn-ajustes" class="btn btn-ghost btn-icon-ajustes" title="Ajustes" aria-label="Ajustes">
          <svg class="settings-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path class="settings-gear-fill" d="M19.14,12.94a7.35,7.35,0,0,0,.05-.94,7.35,7.35,0,0,0-.05-.94l2.03-1.58a.5.5,0,0,0,.12-.64l-1.92-3.32a.5.5,0,0,0-.6-.22l-2.39.96a7.28,7.28,0,0,0-1.63-.94L14.5,2.78a.5.5,0,0,0-.5-.41h-4a.5.5,0,0,0-.5.41L9.25,5.32a7.28,7.28,0,0,0-1.63.94l-2.39-.96a.5.5,0,0,0-.6.22L2.71,8.84a.5.5,0,0,0,.12.64l2.03,1.58a7.35,7.35,0,0,0-.05.94,7.35,7.35,0,0,0,.05.94L2.83,14.52a.5.5,0,0,0-.12.64l1.92,3.32a.5.5,0,0,0,.6.22l2.39-.96a7.28,7.28,0,0,0,1.63.94l.25,2.54a.5.5,0,0,0,.5.41h4a.5.5,0,0,0,.5-.41l.25-2.54a7.28,7.28,0,0,0,1.63-.94l2.39.96a.5.5,0,0,0,.6-.22l1.92-3.32a.5.5,0,0,0-.12-.64ZM12,16.2A4.2,4.2,0,1,1,16.2,12,4.2,4.2,0,0,1,12,16.2Z"></path>
            <circle class="settings-center-fill" cx="12" cy="12" r="3.2"></circle>
          </svg>
        </button>
        <button id="btn-logout" class="btn btn-ghost btn-icon-logout" title="Salir" aria-label="Salir">
          <svg class="logout-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M10 4H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h5"></path>
            <path d="M13 8l4 4-4 4"></path>
            <path d="M8 12h9"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Contenedor principal -->
    <div class="main-container">
      <!-- Sidebar -->
      <div class="sidebar">
        <nav class="sidebar-nav">
          <a href="#" class="nav-item" data-module="caja">
            <span class="nav-icon">💰</span>
            <span class="nav-label">Caja</span>
          </a>
          <a href="#" class="nav-item" data-module="productos">
            <span class="nav-icon">📦</span>
            <span class="nav-label">Productos</span>
          </a>
          <a href="#" class="nav-item" data-module="clientes">
            <span class="nav-icon">👥</span>
            <span class="nav-label">Clientes</span>
          </a>
          <a href="#" class="nav-item" data-module="reparaciones">
            <span class="nav-icon">🔧</span>
            <span class="nav-label">Reparaciones</span>
          </a>
          <a href="#" class="nav-item" data-module="gestion">
            <span class="nav-icon">📄</span>
            <span class="nav-label">Gestión</span>
          </a>
        </nav>
        <div class="sidebar-license-status" id="sidebar-license-status"></div>
        <div class="sidebar-version" id="sidebar-version">V.0.0.0</div>
      </div>

      <!-- Contenido del módulo -->
      <div class="content-area">
        <div id="module-content"></div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api-pb.js"></script>
  <script src="modules/verifactu/verifactu-core.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
